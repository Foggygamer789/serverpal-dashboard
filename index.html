<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServerPal – Phase 0</title>
  <!-- Supabase JS library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --accent: #3b82f6;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }
    body { margin:0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--panel); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
    .sidebar h1 { font-size: 1.5rem; margin:0; color: var(--accent); }
    .server-btn { background: transparent; border: 1px solid #334155; color: var(--text); padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; text-align: left; }
    .server-btn.active { border-color: var(--accent); background: rgba(59,130,246,0.1); }
    .main { flex:1; display: flex; flex-direction: column; padding: 2rem; gap: 1.5rem; overflow-y: auto; }
    .cards { display: flex; gap: 1rem; flex-wrap: wrap; }
    .card { background: var(--panel); border-radius: 12px; padding: 1.25rem; flex: 1 1 150px; text-align: center; }
    .card .value { font-size: 2rem; font-weight: 700; margin: 0.5rem 0; }
    .card .label { font-size: 0.85rem; color: #94a3b8; }
    .green { color: var(--green); } .yellow { color: var(--yellow); } .red { color: var(--red); }
    .chat-panel { flex: 1; background: var(--panel); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { padding: 0.75rem 1rem; border-radius: 10px; max-width: 80%; line-height: 1.5; }
    .msg.ai { background: #1e40af; align-self: flex-start; }
    .msg.user { background: #334155; align-self: flex-end; }
    .chat-input { display: flex; gap: 0.5rem; }
    .chat-input input { flex:1; padding: 0.75rem; border-radius: 8px; border: none; background: #0f172a; color: white; font-size: 1rem; }
    .chat-input button { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
    .auth-input { width: 100%; margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 6px; border: none; background: #0f172a; color: white; }
    .auth-btn { width: 100%; padding: 0.5rem; border: none; border-radius: 6px; background: var(--accent); color: white; font-weight: 600; cursor: pointer; margin-bottom: 0.3rem; }
    .logout-btn { width: 100%; padding: 0.5rem; border: none; border-radius: 6px; background: #ef4444; color: white; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .download-btn { width: 100%; padding: 0.5rem; border: none; border-radius: 6px; background: #22c55e; color: white; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 1rem; }
      .sidebar h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>⚡ ServerPal</h1>

    <!-- Auth Panel -->
    <div id="auth-panel">
      <input type="email" id="auth-email" placeholder="Email" class="auth-input" />
      <input type="password" id="auth-password" placeholder="Password" class="auth-input" />
      <button onclick="signUp()" class="auth-btn">Sign Up</button>
      <button onclick="logIn()" class="auth-btn">Log In</button>
      <button onclick="logOut()" id="logout-btn" class="logout-btn" style="display:none;">Log Out</button>
    </div>

    <!-- Download Plugin Button (only visible after login) -->
    <button onclick="downloadPlugin()" id="download-btn" class="download-btn" style="display:none;">⬇ Download Plugin</button>

    <div id="server-list"></div>
    <div style="margin-top:auto; font-size:0.8rem; color:#64748b;">Phase 0 · Read-only</div>
  </div>

  <div class="main">
    <div class="cards">
      <div class="card"><div class="label">TPS</div><div class="value" id="tps">--</div></div>
      <div class="card"><div class="label">Players</div><div class="value" id="players">--</div></div>
      <div class="card"><div class="label">Memory</div><div class="value" id="memory">--</div></div>
      <div class="card"><div class="label">Status</div><div class="value" id="status">--</div></div>
    </div>
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="msg ai">👋 Welcome! Connect a Minecraft server and I'll read its health in plain English.</div>
      </div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Ask about your server... (e.g., 'what's my TPS?')" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // --- Supabase Setup ---
    const SUPABASE_URL = 'https://jgocsotfiuzleikiiern.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impnb2Nzb3RmaXV6bGVpa2lpZXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDMzMjIsImV4cCI6MjA5NzU3OTMyMn0.cpeVKd-ZIvTtZhanE_Nnz18n44TE-QSzWKEpWDkkQRo';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- Backend API ---
    const API = '/api/proxy';

    // --- Auth helper ---
    async function getAccessToken() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      return session?.access_token || null;
    }

    // --- Auth functions ---
    async function signUp() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) alert(error.message);
      else alert('Check your email to confirm your account!');
    }

    async function logIn() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) alert(error.message);
      else {
        document.getElementById('auth-panel').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'block';
        document.getElementById('download-btn').style.display = 'block';
        loadServers();
      }
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      document.getElementById('server-list').innerHTML = '';
      document.getElementById('auth-panel').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'none';
      document.getElementById('download-btn').style.display = 'none';
      document.getElementById('tps').textContent = '--';
      document.getElementById('players').textContent = '--';
      document.getElementById('memory').textContent = '--';
      document.getElementById('status').textContent = '--';
    }

    // --- Server list & metrics (authenticated) ---
    let servers = [];

    async function loadServers() {
      const token = await getAccessToken();
      if (!token) return;
      try {
        const res = await fetch(`${API}/api/servers`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        servers = await res.json();
        renderServerList();
        if (servers.length > 0) selectServer(servers[0].id);
      } catch (e) { console.log('Backend not connected yet'); }
    }

    function renderServerList() {
      const list = document.getElementById('server-list');
      list.innerHTML = servers.map(s => 
        `<button class="server-btn" onclick="selectServer('${s.id}')">${s.name || s.id}</button>`
      ).join('');
    }

    let selectedServer = null;
    async function selectServer(id) {
      selectedServer = id;
      document.querySelectorAll('.server-btn').forEach((b,i) => b.classList.toggle('active', servers[i]?.id === id));
      await loadMetrics();
    }

    async function loadMetrics() {
      if (!selectedServer) return;
      const token = await getAccessToken();
      if (!token) return;
      try {
        const res = await fetch(`${API}/api/servers/${selectedServer}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        const tps = data.tps || 0;
        document.getElementById('tps').textContent = tps.toFixed(1);
        document.getElementById('tps').className = `value ${tps >= 18 ? 'green' : tps >= 12 ? 'yellow' : 'red'}`;
        document.getElementById('players').textContent = data.players || 0;
        document.getElementById('memory').textContent = `${data.memory || 0}%`;
        document.getElementById('status').textContent = tps >= 18 ? 'Healthy' : tps >= 12 ? 'Lagging' : 'Critical';
        document.getElementById('status').className = `value ${tps >= 18 ? 'green' : tps >= 12 ? 'yellow' : 'red'}`;
      } catch (e) { /* server might be offline */ }
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg || !selectedServer) return;
      addChatMessage(msg, 'user');
      input.value = '';
      const token = await getAccessToken();
      if (!token) return;
      try {
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ serverId: selectedServer, message: msg })
        });
        const data = await res.json();
        addChatMessage(data.reply, 'ai');
      } catch (e) { addChatMessage('Sorry, the backend is not reachable yet.', 'ai'); }
    }

    function addChatMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      document.getElementById('chat-messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    // --- Download Plugin ---
    async function downloadPlugin() {
      const token = await getAccessToken();
      if (!token) return alert('Please log in first.');
      const res = await fetch(`${API}/api/download-plugin`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.error) return alert(data.error);
      // Show key, config, and JAR link
      const message = `Your plugin key: ${data.key}\n\nConfig.yml content (save as config.yml in plugins/ServerPal folder):\n${data.config}\n\nDownload the JAR from:\n${data.jar_url}\n\nPlace the JAR in your plugins folder and create the config.yml file.`;
      alert(message);
    }

    // Initial load – if already logged in (session exists), show dashboard
    (async () => {
      const token = await getAccessToken();
      if (token) {
        document.getElementById('auth-panel').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'block';
        document.getElementById('download-btn').style.display = 'block';
        loadServers();
      }
    })();

    setInterval(loadMetrics, 5000);
  </script>
</body>
</html>
